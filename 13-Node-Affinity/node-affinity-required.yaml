apiVersion: v1
kind: Pod
metadata:
  name: pod-required-affinity
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-type
            operator: In
            values:
            - worker
  containers:
  - name: nginx
    image: nginx:alpine