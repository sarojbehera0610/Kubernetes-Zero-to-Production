apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo-deployment
  namespace: default
  labels:
    app: hpa-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-demo
  template:
    metadata:
      labels:
        app: hpa-demo
    spec:
      containers:
        - name: hpa-demo
          image: sarojbehera/easycrud-backend:latest   # Spring Boot app used as load target
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"         # HPA scales based on this baseline
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"