apiVersion: v1
kind: Pod
metadata:
  name: load-generator
  namespace: default
spec:
  containers:
    - name: load-generator
      image: busybox
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            wget -q -O- http://hpa-demo-service/api/students
            done
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
  restartPolicy: Never